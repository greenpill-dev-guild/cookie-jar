name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: nightly

    - name: Install dependencies
      run: pnpm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Build contracts
      run: |
        cd contracts
        forge build

    - name: Run E2E tests
      run: |
        # Start Anvil blockchain in background
        cd contracts
        anvil --host 0.0.0.0 --port 8545 --chain-id 31337 --accounts 10 --balance 1000 > anvil.log 2>&1 &
        ANVIL_PID=$!
        
        # Wait for Anvil to be ready
        for i in {1..30}; do
          if curl -s -X POST -H "Content-Type: application/json" \
             --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
             http://127.0.0.1:8545 > /dev/null 2>&1; then
            echo "✅ Anvil is ready!"
            break
          fi
          echo "Waiting for Anvil... ($i/30)"
          sleep 1
          if [ $i -eq 30 ]; then
            echo "❌ Anvil failed to start"
            exit 1
          fi
        done
        
        # Deploy contracts and seed demo data
        cd ..
        forge script contracts/script/DeployLocal.s.sol:DeployLocalScript \
          --rpc-url http://127.0.0.1:8545 \
          --broadcast \
          --sender 0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266 \
          --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
        
        # Create deployment files
        ./scripts/create-deployment-file.sh
        ./scripts/copy-deployment.sh
        
        # Start Next.js dev server in background
        cd client
        pnpm generate
        npm run dev &
        NEXTJS_PID=$!
        
        # Wait for Next.js to be ready
        cd ..
        for i in {1..60}; do
          if curl -s http://localhost:3000 > /dev/null 2>&1; then
            echo "✅ Next.js is ready!"
            break
          fi
          echo "Waiting for Next.js... ($i/60)"
          sleep 2
          if [ $i -eq 60 ]; then
            echo "❌ Next.js failed to start"
            exit 1
          fi
        done
        
        # Run E2E tests
        npx playwright test --reporter=html
        
        # Cleanup
        kill $ANVIL_PID $NEXTJS_PID || true

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: e2e/playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: e2e/test-results/
        retention-days: 30

  accessibility-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8

    - name: Install dependencies
      run: pnpm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run accessibility tests only
      run: npx playwright test --grep "accessibility" --reporter=html

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: accessibility-report
        path: e2e/playwright-report/
        retention-days: 30
